version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: biomarket-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: biomarket_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - biomarket-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: biomarket-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/biomarket_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    networks:
      - biomarket-network

volumes:
  postgres_data:

networks:
  biomarket-network:
    driver: bridge
