<div class="spinner-container">
  <!-- Animated Apple SVG Spinner -->
  <div class="apple-spinner">
    <svg
      viewBox="0 0 100 100"
      xmlns="http://www.w3.org/2000/svg"
      class="apple-svg"
    >
      <!-- Apple Body -->
      <ellipse cx="50" cy="55" rx="35" ry="38" fill="var(--color-primary)" />
      
      <!-- Apple Left Indent -->
      <ellipse cx="35" cy="35" rx="15" ry="18" fill="var(--color-surface)" />
      
      <!-- Apple Right Indent -->
      <ellipse cx="65" cy="35" rx="15" ry="18" fill="var(--color-surface)" />
      
      <!-- Apple Bottom Indent -->
      <circle cx="50" cy="90" r="8" fill="var(--color-surface)" />
      
      <!-- Leaf -->
      <ellipse cx="65" cy="25" rx="12" ry="8" fill="var(--color-primary)" transform="rotate(-30 65 25)" />
      <path d="M 65 20 Q 70 22 72 28" stroke="var(--color-primary)" stroke-width="1.5" fill="none" />
      
      <!-- Stem -->
      <line x1="50" y1="15" x2="50" y2="5" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round" />
      
      <!-- Shine Effect -->
      <ellipse cx="40" cy="40" rx="12" ry="18" fill="white" opacity="0.3" />
    </svg>
  </div>

  <!-- Loading Message -->
  <div class="spinner-text">{{ message }}</div>
</div>
